name: Compilar APK Android

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório
    - name: Baixar o código fonte
      uses: actions/checkout@v4

    # 2. Instala o Java JDK 17 (compatível com build.gradle.kts moderno)
    - name: Configurar o Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Como o 'gradlew' não está na sua raiz, este passo instala o Gradle na máquina virtual
    #    e recria o executável 'gradlew' faltante antes de compilar.
    - name: Instalar Gradle e Criar Wrapper Faltante
      run: |
        sudo apt-get update && sudo apt-get install -y gradle
        gradle wrapper

    # 4. Concede a permissão de execução para o arquivo recém-gerado
    - name: Conceder permissão ao Gradle Wrapper
      run: chmod +x gradlew

    # 5. Executa a compilação usando o script Kotlin do seu projeto
    - name: Compilar o APK de Debug
      run: ./gradlew assembleDebug

    # 6. Captura o APK gerado e disponibiliza para você na aba Actions
    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: meu-aplicativo-apk
        path: app/build/outputs/apk/debug/app-debug.apk